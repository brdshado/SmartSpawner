# Main GUI Layout Configuration
# Slot positions: 1-27 (3 rows of 9 slots each)
# Valid materials: https://jd.papermc.io/paper/1.21.8/org/bukkit/Material.html
#
# Format:
#   slot_X:                    # X = slot number (1-27)
#     material: MATERIAL_NAME  # Material to display (use PLAYER_HEAD for spawner mob head)
#     custom_texture: "..."    # Optional: Custom texture hash for PLAYER_HEAD (similar to spawners_settings.yml)
#     enabled: true/false      # Show/hide button
#     info_button: true/false  # Optional: Mark as spawner info button for timer updates
#     click:                   # Also supports left_click, right_click, and shift variants
#       action: "action"
#       sound: ui.button.click
#       sound_success: entity.experience_orb.pickup
#       sound_fail: block.note_block.pling
#     cooldown: "5s"           # Optional: Per-player cooldown; omitted by default
#
# Conditions:
#   sell_integration: Show only when sell/shop integration is enabled
#   no_sell_integration: Show only when sell/shop integration is disabled
#
# Actions:
#   open_storage: Open storage GUI
#   open_stacker: Open stacker GUI
#   sell_and_exp: Sell all items and collect exp
#   collect_exp: Collect exp only
#   none: Display only, no action

# Skip main GUI and open storage directly when clicking spawner
# When enabled: Right-clicking a spawner opens the storage GUI directly
# When disabled: Right-clicking a spawner opens the main GUI first (default behavior)
skip_main_gui: false


# Storage button
slot_12:
  material: CHEST
  enabled: true
  click:
    action: "open_storage"
    sound: block.chest.open

# Spawner info button (conditional actions)
slot_14:
  material: PLAYER_HEAD
  enabled: true
  info_button: true
  if:
    sell_integration:
      click:
        action: "sell_and_exp"
        sound: ui.button.click
        sound_success: block.note_block.bell
        sound_fail: block.note_block.pling
    no_sell_integration:
      click:
        action: "none"

# Experience bottle
slot_16:
  material: EXPERIENCE_BOTTLE
  enabled: true
  click:
    action: "collect_exp"
    sound_success: entity.experience_orb.pickup
    sound_fail: block.note_block.pling
