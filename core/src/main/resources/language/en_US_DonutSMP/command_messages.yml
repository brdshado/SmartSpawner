# SmartSpawner – command_messages.yml
# Messages related to plugin commands, including usage instructions and command errors.

# ──────────────────────────────────────────────────────
#                        General
# ──────────────────────────────────────────────────────
player_only:
  message: "&#FF4444This command can only be used by players."
  sound: block.note_block.bass

no_permission:
  message: "&#FF4444You do not have permission to do this."
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                     /ss list
# ──────────────────────────────────────────────────────
list:
  no_spawners_found:
    message: '&#FF4444No spawners were found.'
    sound: block.note_block.pling
  teleported_to_spawner:
    message: 'You were teleported to the spawner.'
    sound: entity.enderman.teleport
  teleport_failed:
    message: '&#FF4444Unable to teleport to spawner.'
    sound: entity.enderman.teleport
  spawner_removed:
    message: '&fThe spawner was &#FF4444removed &fsuccessfully.'
    sound: entity.item.break

# ──────────────────────────────────────────────────────
#                        /ss set
# ──────────────────────────────────────────────────────
set:
  usage:
    message: "Usage: &#3498db/ss set <stack_size|range|delay> <value> [world x y z]"
    sound: block.note_block.hat
  invalid:
    message: "&#FF4444Invalid value or SmartSpawner location."
    sound: block.note_block.pling
  stack_size_exceeds_max:
    message: "&#FF4444Stack size &f{value} &#FF4444exceeds this spawner's max stack size: &f{max}"
    sound: block.note_block.pling
  location_required:
    message: "&#F0C857Console must provide a location: &#3498db/ss set <stack_size|range|delay> <value> <world> <x> <y> <z>"
    sound: block.note_block.pling
  success:
    message: "Set &a{property} &ffrom &e{old_value} &fto &a{new_value} &fat &#3498db{world} {x} {y} {z}&f."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                        /ss near
# ──────────────────────────────────────────────────────
near:
  bossbar:
    analyzing: "Scanning nearby spawners... {percent}%"
    found: "Found {count} spawner(s) within {radius} blocks."
    not_found: "No spawners found within {radius} blocks."
  view_gui:
    button: " [View in GUI]"
    hover: "Click to browse the {count} spawner(s) found nearby."
  scan_start:
    message: "Scanning for spawners within &e{radius} &fblocks..."
    sound: block.note_block.hat
  scan_found:
    message: "Found &a{count} &fspawner(s) within &e{radius} &fblocks. Highlights last &e30s&f."
    sound: entity.experience_orb.pickup
  scan_none:
    message: "&#FF4444No spawners found within &f{radius} &#FF4444blocks."
    sound: block.note_block.pling
  scan_cancelled:
    message: "&#F0C857Scan cancelled and highlights removed."
    sound: block.note_block.bass
  no_active_scan:
    message: "&#FF4444You do not have an active scan to cancel."
    sound: block.note_block.bass
  highlights_expired:
    message: "&#888888Spawner highlights have expired."

# ──────────────────────────────────────────────────────
#                        /ss give
# ──────────────────────────────────────────────────────
give:
  player_not_found:
    message: "&#FF4444Player not found."
    sound: block.note_block.pling
  invalid_mob_type:
    message: "&#FF4444Invalid mob type."
    sound: block.note_block.pling
  invalid_item_type:
    message: "&#FF4444Invalid item type."
    sound: block.note_block.pling
  invalid_item_spawner:
    message: "&#FF4444Invalid item spawner type."
    sound: block.note_block.pling
  inventory_full:
    message: "&#FF4444Some spawner items were dropped because the inventory is full."
    sound: block.note_block.pling
  spawner_received:
    message: "You received &a{amount} {entity} &fspawner(s)."
    sound: entity.experience_orb.pickup
  spawner_given:
    message: "Gave &a{amount} {entity} &fspawner(s) to &#3498db{player}&f."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                      /ss hologram
# ──────────────────────────────────────────────────────
hologram:
  enabled:
    message: "Holograms are &aenabled &ffor all spawners."
    sound: entity.experience_orb.pickup
  disabled:
    message: "Holograms are &#FF4444disabled &ffor all spawners."
    sound: block.note_block.bass
  cleared:
    message: "Successfully cleared &aall holograms&f."
    sound: entity.experience_orb.pickup
  clear_error:
    message: "&#FF4444Failed to clear holograms."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                       /ss clear
# ──────────────────────────────────────────────────────
clear:
  usage:
    message: "Usage: &#3498db/ss clear <holograms|ghost_spawners>"
    sound: block.note_block.hat
  ghost_check_start:
    message: "Checking for ghost spawners..."
    sound: block.note_block.hat
  ghost_cleared:
    message: "Successfully removed &a{count} &fghost spawner(s)."
    sound: entity.experience_orb.pickup
  ghost_none_found:
    message: "&#FF4444No ghost spawners found."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                       /ss prices
# ──────────────────────────────────────────────────────
prices:
  not_available:
    message: "&#FF4444Sell integration is not available. Please configure economy settings."
    sound: block.note_block.pling
  no_priceable_items:
    message: "&#FF4444No items with prices were found."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                      /ss reload
# ──────────────────────────────────────────────────────
reload:
  start:
    message: "&#F0C857Reloading plugin... Please wait."
  success:
    message: "Successfully reloaded &#3498dbSmartSpawner&f."
    sound: entity.experience_orb.pickup
  error:
    message: "&#FF4444Failed to reload SmartSpawner. Please check console for details."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                      /ss language
# ──────────────────────────────────────────────────────
language:
  current:
    message: "Current language: &a{current} &#888888| &fAvailable: {available}"
    sound: block.note_block.hat
  invalid:
    message: "&#FF4444Unknown language: &f{value}&#FF4444. Try: &f{available}"
    sound: block.note_block.pling
  already_set:
    message: "&#F0C857Language is already set to &f{value}&#F0C857."
    sound: block.note_block.hat
  success:
    message: "Language changed from &e{old_value} &fto &a{new_value}&f."
    sound: entity.experience_orb.pickup
  error:
    message: "&#FF4444Failed to change language. Please check console."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                     /ss gui_layout
# ──────────────────────────────────────────────────────
gui_layout:
  current:
    message: "Current layout: &a{current} &#888888| &fAvailable: {available}"
    sound: block.note_block.hat
  invalid:
    message: "&#FF4444Unknown GUI layout: &f{value}&#FF4444. Try: &f{available}"
    sound: block.note_block.pling
  already_set:
    message: "&#F0C857GUI layout is already set to &f{value}&#F0C857."
    sound: block.note_block.hat
  success:
    message: "GUI layout changed from &e{old_value} &fto &a{new_value}&f."
    sound: entity.experience_orb.pickup
  error:
    message: "&#FF4444Failed to change GUI layout. Please check console."
    sound: block.note_block.pling
