# SmartSpawner – messages.yml
# Her bir giriş şunları destekler: message, title, subtitle, action_bar, sound, enabled.
#
#   MESAJ YAPISI:
#   message_name:               # Mesaj için benzersiz tanımlayıcı
#     enabled: true/false       # Bu mesajın tamamını aç veya kapat (varsayılan: belirtilmemişse true)
#     message: "Metin içeriği"  # Ana sohbet mesajı (isteğe bağlı)
#     title: "Başlık metni"     # Başlık görünümü (isteğe bağlı)
#     subtitle: "Alt başlık"    # Alt başlık görünümü (isteğe bağlı)
#     action_bar: "Metin"       # Eylem çubuğu (action bar) metni (isteğe bağlı)
#     sound: sound.effect       # Çalınacak ses (isteğe bağlı)
#
#   ÖNEMLİ ÖZELLİKLER:
#   - Eğer "enabled: false" ayarlanırsa, bileşenlerin hiçbiri oyuncuya gönderilmez
#   - Eğer birden fazla bileşen varsa (message, title, action_bar, sound), hepsi gönderilir
#   - Tüm bileşenler isteğe bağlıdır - ihtiyacınıza göre herhangi bir kombinasyonu kullanabilirsiniz
#   - "message" alanı zorunlu değildir ve sadece diğer bileşenleri kullanmak istiyorsanız atlanabilir

prefix: '&#3498dbSmartSpawner &8⏩ &r'

missing_message_key:
  message: '&#FF4444Eksik mesaj anahtarı: &f{key}'

# ──────────────────────────────────────────────────────
#              Oyuncu Etkileşimi (Genel)
# ──────────────────────────────────────────────────────
