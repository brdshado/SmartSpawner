# SmartSpawner – items.yml
# Spawner eşyalarının görüntülenme isimleri ve düşen eşya isimleri.

# Smart spawner eşyalarının envanterde ve araç ipuçlarındaki görünümü
# Kullanılabilir değişkenler: {entity}, {ᴇɴᴛɪᴛʏ}, {exp}, {loot_items}, {amount}, {item_name}, {chance}
smart_spawner:
  default:
    name: '&#5DB5F1{entity} Spawner'
    loot_items: '  &#ecf0f1 • {amount}x {item_name} &#3498db(%{chance})'
    loot_items_empty: '  &#ecf0f1 •  Yok'
    lore:
      - ''
      - ' &#5DB5F1 Detay:'
      - '  &#ecf0f1 • &fVerilen XP: &a{exp}'
      - ''
      - ' &#5DB5F1 Düşenler:'
      - '{loot_items}'
      - ''
  # Yaratığa özel bölümler, belirtilen anahtar için varsayılanı ezer. Belirtilmeyen anahtarlar varsayılanı kullanır.
  PIG:
    name: '&#FF77B7{entity} Spawner'
    loot_items: '  &#FFF0F7 • {amount}x {item_name} &#FF8FC7(%{chance})'
    loot_items_empty: '  &#FFF0F7 •  Yok'
    lore:
      - ''
      - ' &#FF77B7 Detay:'
      - '  &#FFF0F7 • &fVerilen XP: &#FF8FC7{exp}'
      - ''
      - ' &#FF77B7 Düşenler:'
      - '{loot_items}'
      - ''
  BLAZE:
    name: '&#FFB300{entity} Spawner'
    loot_items: '  &#FFF4CC • {amount}x {item_name} &#FFC107(%{chance})'
    loot_items_empty: '  &#FFF4CC •  Yok'
    lore:
      - ''
      - ' &#FFB300 Detay:'
      - '  &#FFF4CC • &fVerilen XP: &#FFD54F{exp}'
      - ''
      - ' &#FFB300 Düşenler:'
      - '{loot_items}'
      - ''

