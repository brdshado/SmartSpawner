      exp: 'XP Topla'
      stacker: 'Stack Yönet'
      sell_and_exp: 'Sat + XP Topla'
      sell_all: 'Eşyaları Sat'
      view_info: 'Bilgileri Gör'
      back: 'Geri'

    button_images:
