# SmartSpawner – gui.yml
# GUI eşya isimleri, açıklamaları, başlıkları ve buton etiketleri.

# ──────────────────────────────────────────────────────
#                  Ana Arayüz (Main GUI)
# ──────────────────────────────────────────────────────
gui_title_main:
  single_spawner: '&#545454{entity} Spawner'
  stacked_spawner: '&#545454{amount} adet {entity} Spawner'

spawner_storage_item:
  # İsim (name) için kullanılabilir değişkenler:
  # {max_slots} - Depodaki maksimum slot sayısı (virgülle biçimlendirilmiş)
  # {current_items} - Depodaki mevcut eşya sayısı
  # {percent_storage_rounded} - Kullanılan depo yüzdesi (0-100)
  # {entity} - Spawner'ın yaratık türü (normal yazım)
  name: '&#e67e22Spawner Deposu'

  # Açıklama (lore) satırlarının tümü için kullanılabilir değişkenler:
  # {max_slots} - Depodaki maksimum slot sayısı (virgülle biçimlendirilmiş)
  # {current_items} - Depodaki mevcut eşya sayısı
  # {percent_storage_rounded} - Kullanılan depo yüzdesi (0-100)
  # {loot_items} - Düşen eşyaların biçimlendirilmiş tam listesi
  # {entity} - Spawner'ın yaratık türü (normal yazım)
  lore:
    - ''
    - '&#e67e22◈ &#ecf0f1İstatistikler:'
    - '  &#bdc3c7•  Slotlar: &#e67e22{current_items} &#bdc3c7/ &#e67e22{max_slots}'
    - '  &#bdc3c7•  Depo: &#e67e22{percent_storage_rounded}% dolu'
    - ''
    - '&#e67e22⊳ &#ecf0f1Depoyu açmak için tıklayın'
    # Düşen tüm eşyaları göstermek isterseniz aşağıdaki satırı aktif edebilirsiniz.
    # - '{loot_items}'

  # {loot_items} kullanıldığında her bir düşen eşyanın nasıl görüntüleneceğini tanımlar
  # Her bir düşen eşya için kullanılabilir değişkenler:
  # {item_name} - Eşyanın adı (normal yazım)
  # {amount} - Eşya sayısı (virgülle biçimlendirilmiş)
  # {raw_amount} - Eşya sayısı (biçimlendirilmemiş)
  # {chance} - Bu eşyanın düşme şansı (% sembolüyle birlikte, örn: "8.5%")
  loot_items: '  &#bdc3c7•  &#2ecc71{amount} &#bdc3c7{item_name}'
  loot_items_empty: '  &#bdc3c7•  Yok'


# Kullanılabilir değişkenler:
# {entity}           - Biçimlendirilmiş yaratık adı (örn: "Zombie")
# {stack_size}       - Bu konumda üst üste yığılmış (stacked) spawner sayısı
# {range}            - Blok cinsinden doğma mesafesi
# {delay}            - Saniye cinsinden doğma gecikmesi
# {min_mobs}         - Tek seferde doğabilecek minimum yaratık sayısı
# {max_mobs}         - Tek seferde doğabilecek maksimum yaratık sayısı
# {current_items}    - Depolanan mevcut eşya sayısı
# {max_items}        - Maksimum eşya depolama kapasitesi
# {percent_storage_rounded}  - Depo kullanım yüzdesi (tamsayı, örn: "87")
# {percent_storage_decimal} - Depo kullanım yüzdesi (ondalıklı, örn: "87.5")
# {current_exp}      - Depolanan mevcut deneyim/XP (virgülle biçimlendirilmiş)
# {max_exp}          - Maksimum deneyim/XP kapasitesi (virgülle biçimlendirilmiş)
# {raw_current_exp}  - Biçimlendirilmemiş mevcut deneyim sayısı
# {raw_max_exp}      - Biçimlendirilmemiş maksimum deneyim sayısı
# {percent_exp_rounded}      - Deneyim deposu kullanım yüzdesi (tamsayı)
# {percent_exp_decimal}    - Deneyim deposu kullanım yüzdesi (ondalıklı, örn: "42.7")
spawner_info_item:
  name: '&#3498db{entity} Spawner'
  lore:
    - ''
    - '&#3498db◈ &#ecf0f1Bilgiler:'
    - '  &#bdc3c7•  Stack: &#3498db{stack_size}'
    - '  &#bdc3c7•  Mesafe: &#3498db{range} &#bdc3c7blok'
    - '  &#bdc3c7•  Spawn Miktarı: &#3498db{min_mobs} &#bdc3c7- &#3498db{max_mobs}'
    - '  &#bdc3c7•  Gecikme: &#3498db{delay} &#bdc3c7sn'
    - '  &#bdc3c7•  Sonraki Spawn: &#3498db{time}'
    - '  &#bdc3c7•  Satılabilir: &a+${total_sell_price}'
    - ''
    - "  &#3498db⊳ &#ecf0f1Sağ Tık: Stacker menüsünü aç"
    - "  &#3498db⊳ &#ecf0f1Tıkla: Eşyaları sat & XP topla"

  lore_no_shop:
    - ''
    - '&#3498db◈ &#ecf0f1Bilgiler:'
    - '  &#bdc3c7•  Stack: &#3498db{stack_size}'
    - '  &#bdc3c7•  Mesafe: &#3498db{range} &#bdc3c7blok'
    - '  &#bdc3c7•  Spawn Miktarı: &#3498db{min_mobs} &#bdc3c7- &#3498db{max_mobs}'
    - '  &#bdc3c7•  Gecikme: &#3498db{delay} &#bdc3c7sn'
    - '  &#bdc3c7•  Sonraki Spawn: &#3498db{time}'
    - ''
    - "  &#3498db⊳ &#ecf0f1Tıkla: Stacker menüsünü aç"

  lore_full: '&#ff5252Depo & XP dolu!'
  lore_inactive: '&#ff3333Spawner pasif!'
  lore_no_loot: '&#ff3333Ganimet ayarlanmamış'

exp_info_item:
