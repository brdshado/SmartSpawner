  invalid:
    message: "&#FF4444Ngôn ngữ không xác định: &f{value}&#FF4444. Thử: &f{available}"
    sound: block.note_block.pling
  already_set:
    message: "&#F0C857Ngôn ngữ đã được đặt thành &f{value}&#F0C857."
    sound: block.note_block.hat
  success:
    message: "Đã đổi ngôn ngữ từ &e{old_value} &fsang &a{new_value}&f."
