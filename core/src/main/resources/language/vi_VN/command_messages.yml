# SmartSpawner – command_messages.yml
# Messages related to plugin commands, including usage instructions and command errors.

# ──────────────────────────────────────────────────────
#                        General
# ──────────────────────────────────────────────────────
player_only:
  message: "&#FF4444Lệnh này chỉ người chơi mới có thể sử dụng."
  sound: block.note_block.bass

no_permission:
  message: "&#FF4444Bạn không có quyền thực hiện thao tác này."
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                     /ss list
# ──────────────────────────────────────────────────────
list:
  no_spawners_found:
    message: '&#FF4444Không tìm thấy spawner nào.'
    sound: block.note_block.pling
  teleported_to_spawner:
    message: 'Bạn đã được dịch chuyển đến spawner.'
    sound: entity.enderman.teleport
  teleport_failed:
    message: '&#FF4444Không thể dịch chuyển đến spawner.'
    sound: entity.enderman.teleport
  spawner_removed:
    message: '&fSpawner đã được &#FF4444gỡ bỏ &fthành công.'
    sound: entity.item.break

# ──────────────────────────────────────────────────────
#                        /ss set
# ──────────────────────────────────────────────────────
set:
  usage:
    message: "Cách dùng: &#3498db/ss set <stack_size|range|delay> <value> [world x y z]"
    sound: block.note_block.hat
  invalid:
    message: "&#FF4444Giá trị hoặc vị trí SmartSpawner không hợp lệ."
    sound: block.note_block.pling
  stack_size_exceeds_max:
    message: "&#FF4444Số lượng stack &f{value} &#FF4444vượt quá giới hạn stack của spawner này: &f{max}"
    sound: block.note_block.pling
  location_required:
    message: "&#F0C857Console phải cung cấp vị trí: &#3498db/ss set <stack_size|range|delay> <value> <world> <x> <y> <z>"
    sound: block.note_block.pling
  success:
    message: "Đã đặt &a{property} &ftừ &e{old_value} &fthành &a{new_value} &ftại &#3498db{world} {x} {y} {z}&f."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                        /ss near
# ──────────────────────────────────────────────────────
near:
  bossbar:
    analyzing: "Đang quét các spawner gần đây... {percent}%"
    found: "Đã tìm thấy {count} spawner trong phạm vi {radius} khối."
    not_found: "Không tìm thấy spawner trong phạm vi {radius} khối."
  view_gui:
    button: " [Xem trong GUI]"
    hover: "Nhấp để xem {count} spawner tìm thấy gần đây."
  scan_start:
    message: "Đang quét spawner trong phạm vi &e{radius} &fkhối..."
    sound: block.note_block.hat
  scan_found:
    message: "Đã tìm thấy &a{count} &fspawner trong phạm vi &e{radius} &fkhối. Đánh dấu kéo dài &e30s&f."
    sound: entity.experience_orb.pickup
  scan_none:
    message: "&#FF4444Không tìm thấy spawner trong phạm vi &f{radius} &#FF4444khối."
    sound: block.note_block.pling
  scan_cancelled:
    message: "&#F0C857Đã hủy quét và xóa đánh dấu."
    sound: block.note_block.bass
  no_active_scan:
    message: "&#FF4444Bạn không có lượt quét đang hoạt động để hủy."
    sound: block.note_block.bass
  highlights_expired:
    message: "&#888888Đánh dấu spawner đã hết hạn."

# ──────────────────────────────────────────────────────
#                        /ss give
# ──────────────────────────────────────────────────────
give:
  player_not_found:
    message: "&#FF4444Không tìm thấy người chơi."
    sound: block.note_block.pling
  invalid_mob_type:
    message: "&#FF4444Loại sinh vật không hợp lệ."
    sound: block.note_block.pling
  invalid_item_type:
    message: "&#FF4444Loại vật phẩm không hợp lệ."
    sound: block.note_block.pling
  invalid_item_spawner:
    message: "&#FF4444Loại spawner vật phẩm không hợp lệ."
    sound: block.note_block.pling
  inventory_full:
    message: "&#FF4444Một số spawner đã rơi ra vì túi đồ đã đầy."
    sound: block.note_block.pling
  spawner_received:
    message: "Bạn đã nhận &a{amount} &fspawner {entity}."
    sound: entity.experience_orb.pickup
  spawner_given:
    message: "Đã trao &a{amount} &fspawner {entity} cho &#3498db{player}&f."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                      /ss hologram
# ──────────────────────────────────────────────────────
hologram:
  enabled:
    message: "Hologram đã được &abật &fcho tất cả spawner."
    sound: entity.experience_orb.pickup
  disabled:
    message: "Hologram đã được &#FF4444tắt &fcho tất cả spawner."
    sound: block.note_block.bass
  cleared:
    message: "Đã xóa thành công &atất cả hologram&f."
    sound: entity.experience_orb.pickup
  clear_error:
    message: "&#FF4444Không thể xóa hologram."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                       /ss clear
# ──────────────────────────────────────────────────────
clear:
  usage:
    message: "Cách dùng: &#3498db/ss clear <holograms|ghost_spawners>"
    sound: block.note_block.hat
  ghost_check_start:
    message: "Đang kiểm tra spawner ảo..."
    sound: block.note_block.hat
  ghost_cleared:
    message: "Đã gỡ thành công &a{count} &fspawner ảo."
    sound: entity.experience_orb.pickup
  ghost_none_found:
    message: "&#FF4444Không tìm thấy spawner ảo."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                       /ss prices
# ──────────────────────────────────────────────────────
prices:
  not_available:
    message: "&#FF4444Tích hợp bán chưa khả dụng. Vui lòng cấu hình kinh tế."
    sound: block.note_block.pling
  no_priceable_items:
    message: "&#FF4444Không tìm thấy vật phẩm có giá."
    sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                      /ss reload
# ──────────────────────────────────────────────────────
reload:
  start:
    message: "&#F0C857Đang tải lại plugin... Vui lòng chờ."
  success:
    message: "Đã tải lại thành công &#3498dbSmartSpawner&f."
    sound: entity.experience_orb.pickup
  error:
    message: "&#FF4444Không thể tải lại SmartSpawner. Vui lòng kiểm tra console để biết chi tiết."
    sound: block.note_block.pling

